<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Tier List - S to D Rankings</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        /* Background image with blur */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
        }

        .container {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1400px;
            width: 100%;
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 8px;
            font-size: 1.8em;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 20px;
            font-size: 0.85em;
        }

        /* Tier grid layout - responsive */
        .tier-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        /* Individual tier column */
        .tier-column {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        /* Tier header */
        .tier-header {
            padding: 12px 8px;
            text-align: center;
            font-size: 1.8em;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .tier-header span {
            font-size: 0.5em;
            display: block;
            margin-top: 4px;
            font-weight: normal;
        }

        /* Tier colors */
        .tier-S .tier-header { background: linear-gradient(135deg, #e8e8e8, #b0c4de); color: #2c3e50; }
        .tier-A .tier-header { background: linear-gradient(135deg, #ffec6e, #ffc107); color: #2c3e50; }
        .tier-B .tier-header { background: linear-gradient(135deg, #e0b3ff, #b77cff); color: #2c3e50; }
        .tier-C .tier-header { background: linear-gradient(135deg, #5fdc7a, #2ecc71); color: #2c3e50; }
        .tier-D .tier-header { background: linear-gradient(135deg, #c97e3a, #a05e15); color: white; }

        /* Names container */
        .names-container {
            padding: 10px;
            min-height: 300px;
            max-height: 400px;
            overflow-y: auto;
        }

        /* Individual name item */
        .name-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 10px;
            margin-bottom: 6px;
            border-radius: 8px;
            font-size: 0.85em;
            color: #fff;
            transition: all 0.2s;
            word-break: break-word;
            text-align: center;
        }

        .name-item:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* Empty state */
        .empty-tier {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            padding: 20px;
            font-style: italic;
            font-size: 0.85em;
        }

        /* Statistics */
        .stats {
            text-align: center;
            padding-top: 15px;
            margin-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 0.85em;
        }

        .stats strong {
            color: #ffd700;
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            body {
                padding: 8px;
            }

            .container {
                padding: 15px;
            }

            h1 {
                font-size: 1.4em;
            }

            .subtitle {
                font-size: 0.75em;
                margin-bottom: 15px;
            }

            .tier-grid {
                gap: 8px;
            }

            .tier-header {
                padding: 8px 4px;
                font-size: 1.3em;
            }

            .tier-header span {
                font-size: 0.55em;
            }

            .names-container {
                padding: 6px;
                min-height: 200px;
                max-height: 300px;
            }

            .name-item {
                padding: 6px 6px;
                font-size: 0.75em;
                margin-bottom: 4px;
            }

            .stats {
                font-size: 0.75em;
                padding-top: 12px;
            }
        }

        /* Small phones */
        @media (max-width: 480px) {
            .tier-header {
                font-size: 1.1em;
                padding: 6px 2px;
            }

            .name-item {
                font-size: 0.7em;
                padding: 5px 4px;
            }

            .names-container {
                max-height: 250px;
            }
        }

        /* Custom scrollbar for names container */
        .names-container::-webkit-scrollbar {
            width: 4px;
        }

        .names-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .names-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Tierlist</h1>
        <div class="subtitle">✅ Tested | ❓ Estimated</div>

        <div class="tier-grid" id="tierGrid">
            <!-- Tiers will be populated here -->
        </div>

        <div class="stats" id="stats"></div>
    </div>

    <script>
    // Tier order from left to right
    const TIER_ORDER = ['S', 'A', 'B', 'C', 'D'];

    // YOUR DATA - EDIT THIS SECTION
    const DATA = `❓ icxrrent: S
❓ ITNDnd: S
❓ nLema: S
❓ IImoxi: A
❓ Zirenaa: A
❓ Blueaspen25: B
❓ Joshlauder00: B
❓ OfficialOwly: B`;

    let tierData = {};

    // Initialize data
    function initData() {
        tierData = {};
        TIER_ORDER.forEach(tier => {
            tierData[tier] = [];
        });

        const lines = DATA.split(/\r?\n/);
        for (let line of lines) {
            line = line.trim();
            if (line === '') continue;

            const colonIndex = line.indexOf(':');
            if (colonIndex === -1) continue;

            let name = line.substring(0, colonIndex).trim();
            let tier = line.substring(colonIndex + 1).trim().toUpperCase();

            if (name && TIER_ORDER.includes(tier)) {
                tierData[tier].push(name);
            }
        }

        // Sort names alphabetically within each tier
        for (let tier in tierData) {
            tierData[tier].sort((a, b) => a.localeCompare(b));
        }
    }

    // Render the tier grid
    function renderTiers() {
        const grid = document.getElementById('tierGrid');
        if (!grid) return;

        grid.innerHTML = '';
        let totalItems = 0;

        TIER_ORDER.forEach(tier => {
            const names = tierData[tier] || [];
            totalItems += names.length;

            const column = document.createElement('div');
            column.className = `tier-column tier-${tier}`;

            // Tier header
            const header = document.createElement('div');
            header.className = 'tier-header';
            header.innerHTML = `${tier}<span>${names.length} item${names.length !== 1 ? 's' : ''}</span>`;

            // Names container
            const namesContainer = document.createElement('div');
            namesContainer.className = 'names-container';

            if (names.length === 0) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'empty-tier';
                emptyDiv.textContent = '—';
                namesContainer.appendChild(emptyDiv);
            } else {
                names.forEach(name => {
                    const nameItem = document.createElement('div');
                    nameItem.className = 'name-item';
                    nameItem.textContent = name;
                    namesContainer.appendChild(nameItem);
                });
            }

            column.appendChild(header);
            column.appendChild(namesContainer);
            grid.appendChild(column);
        });

        // Update stats
        const statsDiv = document.getElementById('stats');
        if (statsDiv) {
            const tierCounts = TIER_ORDER.map(tier => `${tier}: ${tierData[tier].length}`).join(' | ');
            statsDiv.innerHTML = `📊 Total Users: <strong>${totalItems}</strong> | ${tierCounts}`;
        }
    }

    // Load background image function
    function loadBackground() {
        const img = new Image();
        img.onload = () => {
            // Background already set in CSS
            console.log('Background loaded');
        };
        img.onerror = () => {
            console.log('Background image not found, using default');
        };
        img.src = 'bg.jpg';
    }

    // Initialize on page load
    initData();
    renderTiers();
    loadBackground();
    </script>
</body>
</html>
