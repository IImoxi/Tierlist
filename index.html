<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Tier List - S to D Rankings</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-overflow-scrolling: touch;
            padding: 12px;
        }

        /* Background image with blur */
        html::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
        }

        .container {
            background: rgba(255, 255, 255, 0.33);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1400px;
            width: 80vw;
            backdrop-filter: blur(32px);
        }

        h1 {
            text-align: center;
            color: black;
            margin-bottom: 8px;
            font-size: 2.0em;
        }

        .subtitle {
            text-align: center;
            color: black;
            margin-bottom: 20px;
            font-size: 0.85em;
        }

        .subtext {
            text-align: center;
            color: black;
            margin-bottom: 5px;
            font-size: 0.85em;
        }

        /* Tier grid layout - responsive columns */
        .tier-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            justify-content: center;
        }

        /* Individual tier column - will wrap on mobile */
        .tier-column {
            flex: 1;
            min-width: 175px;
            background: rgba(0, 0, 0, 0.75);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        /* Tier header */
        .tier-header {
            padding: 12px 8px;
            text-align: center;
            font-size: 1.8em;
            font-weight: bold;
            color: black;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .tier-header span {
            font-size: 0.5em;
            display: block;
            margin-top: 4px;
            font-weight: normal;
        }

        /* Tier colors */
        .tier-S .tier-header { background: linear-gradient(135deg, #e8e8e8, #b0c4de); color: #2c3e50; }
        .tier-A .tier-header { background: linear-gradient(135deg, #ffec6e, #ffc107); color: #2c3e50; }
        .tier-B .tier-header { background: linear-gradient(135deg, #e0b3ff, #b77cff); color: #2c3e50; }
        .tier-C .tier-header { background: linear-gradient(135deg, #5fdc7a, #2ecc71); color: #2c3e50; }
        .tier-D .tier-header { background: linear-gradient(135deg, #c97e3a, #a05e15); color: white; }

        /* Names container */
        .names-container {
            padding: 10px;
            min-height: 300px;
            max-height: 400px;
            overflow-y: auto;
        }

        /* Individual name item */
        .name-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 10px;
            margin-bottom: 6px;
            border-radius: 8px;
            font-size: 0.85em;
            color: #fff;
            transition: all 0.2s;
            word-break: break-word;
            text-align: center;
        }

        .name-item:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* Empty state */
        .empty-tier {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            padding: 20px;
            font-style: italic;
            font-size: 0.85em;
        }

        /* Statistics */
        .stats {
            text-align: center;
            padding-top: 15px;
            margin-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            color: black;
            font-size: 0.85em;
        }

        .stats strong {
            color: #ffd700;
        }

        @media (max-width: 769px) {
            .container {
                width: 95vw;
            }
        }

        @media (min-width: 770px) {
            .tier-column {
                min-width: 150px;
                flex: 1;
            }
        }

        /* Custom scrollbar for names container */
        .names-container::-webkit-scrollbar {
            width: 4px;
        }

        .names-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .names-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ODI SW Tierlist</h1>
        <div class="subtext">Cubecraft Skywars Tierlist by IImoxi</div>
        <div class="subtitle">✅ Tested | ❓ Estimated | Columns are ordered A -> Z.</div>

        <div class="tier-grid" id="tierGrid">
            <!-- Tiers will be populated here -->
        </div>

        <div class="stats" id="stats"></div>
    </div>

    <script>
    const TIER_ORDER = ['S', 'A', 'B', 'C', 'D'];

    const DATA = `❓ icxrrent: S
❓ ITNDnd: S
❓ nLema: S
❓ Ninja Pig2863: A
❓ IImoxi: A
❓ Zirenaa: A
❓ Blueaspen25: B
❓ Joshlauder00: B
❓ OfficialOwly: B
❓ YoShady: B
❓ Badflame94: B
❓ xVonte: B
✅ Nons: D`;

    let tierData = {};

    // Initialize data
    function initData() {
        tierData = {};
        TIER_ORDER.forEach(tier => {
            tierData[tier] = [];
        });

        const lines = DATA.split(/\r?\n/);
        for (let line of lines) {
            line = line.trim();
            if (line === '') continue;

            const colonIndex = line.indexOf(':');
            if (colonIndex === -1) continue;

            let name = line.substring(0, colonIndex).trim();
            let tier = line.substring(colonIndex + 1).trim().toUpperCase();

            if (name && TIER_ORDER.includes(tier)) {
                tierData[tier].push(name);
            }
        }

        // Sort names alphabetically within each tier
        for (let tier in tierData) {
            tierData[tier].sort((a, b) => a.localeCompare(b));
        }
    }

    // Render the tier grid
    function renderTiers() {
        const grid = document.getElementById('tierGrid');
        if (!grid) return;

        grid.innerHTML = '';
        let totalItems = 0;

        TIER_ORDER.forEach(tier => {
            const names = tierData[tier] || [];
            totalItems += names.length;

            const column = document.createElement('div');
            column.className = `tier-column tier-${tier}`;

            // Tier header
            const header = document.createElement('div');
            header.className = 'tier-header';
            header.innerHTML = `${tier}<span></span>`;

            // Names container
            const namesContainer = document.createElement('div');
            namesContainer.className = 'names-container';

            if (names.length === 0) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'empty-tier';
                emptyDiv.textContent = '—';
                namesContainer.appendChild(emptyDiv);
            } else {
                names.forEach(name => {
                    const nameItem = document.createElement('div');
                    nameItem.className = 'name-item';
                    nameItem.textContent = name;
                    namesContainer.appendChild(nameItem);
                });
            }

            column.appendChild(header);
            column.appendChild(namesContainer);
            grid.appendChild(column);
        });

        // Update stats
        const statsDiv = document.getElementById('stats');
        if (statsDiv) {
            const tierCounts = TIER_ORDER.map(tier => `${tier}: ${tierData[tier].length}`).join(' | ');
            statsDiv.innerHTML = `📊 Total Users: <strong>${totalItems}</strong> | ${tierCounts}`;
        }
    }

    // Initialize on page load
    initData();
    renderTiers();
    </script>
</body>
</html>
